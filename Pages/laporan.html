<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .back {
      font-size: 20px;
      margin-right: 10px;
      cursor: pointer;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      margin-bottom: 20px;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 120px 160px 120px;
      gap: 12px;
    }

    .card {
      background: white;
      border: 1px solid #333;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: #eee;
    }

    /* posisi sesuai gambar */
    .hari {
      grid-column: 1;
      grid-row: 1;
    }

    .minggu {
      grid-column: 2;
      grid-row: 1 / span 2;
    }

    .bulan {
      grid-column: 1;
      grid-row: 2 / span 2;
    }

    .tahun {
      grid-column: 2;
      grid-row: 3;
    }

    @media (max-width: 480px) {
      .container {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="back">←</div>
    <div class="title">LAPORAN</div>
  </div>

  <div class="subtitle">Pilih Periode Analisis</div>

  <div class="grid">
    <div class="card hari">1 Hari</div>
    <div class="card minggu">1 Minggu</div>
    <div class="card bulan">1 Bulan</div>
    <div class="card tahun">1 Tahun</div>
  </div>
</div>

</body>
</html>
