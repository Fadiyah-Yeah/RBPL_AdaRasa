<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

.title {
  text-align: center;
  font-weight: bold;
  margin-bottom: 20px;
}

.card {
  background: white;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.time {
  float: right;
  font-size: 11px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Notifikasi</div>

  <div id="list"></div>
</div>

<script>
fetch('get_notif_antar.php')
.then(res=>res.json())
.then(data=>{
  const container = document.getElementById('list');

  data.forEach(item=>{
    container.innerHTML += `
      <div class="card" onclick="goDetail(${item.id_pesanan})">
        <div><b>Ada pesanan siap diantar!</b></div>
        <div>${item.nama_produk}</div>
        <div>${item.jumlah}</div>
        <div class="time">${item.waktu}</div>
      </div>
    `;
  });
});

function goDetail(id){
  window.location.href = `detail_pesanan.html?id=${id}`;
}
</script>

</body>
</html>
